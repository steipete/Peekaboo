name: Website (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "scripts/build-docs-site.mjs"
      - "scripts/docs-site-assets.mjs"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Build docs site
        run: node scripts/build-docs-site.mjs

      - name: Validate docs site artifact
        run: |
          test -f _site/.nojekyll
          test -f _site/.well-known/security.txt
          test -f _site/security.txt
          test -f _site/llms.txt

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site
          include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
